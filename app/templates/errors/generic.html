{% extends "base.html" %}
{% block title %}{{ status_code }} {{ title }} &mdash; TuneFeed{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors.css') }}" />
{% endblock %}

{% block full_page %}
<main class="error-page">
  <section class="error-panel" aria-labelledby="error-title">
    <div class="error-icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h1 id="error-title" class="error-title">{{ status_code }} - {{ title }}</h1>
    <p class="error-copy">{{ message }}</p>
    <a href="{{ url_for('main.discover') }}" class="btn-ts-primary error-action">
      <i class="bi bi-compass"></i>
      Back to Discover
    </a>
  </section>
</main>
{% endblock %}
