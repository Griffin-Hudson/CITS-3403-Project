{% extends "base.html" %}
{% block title %}Page Not Found &mdash; TuneFeed{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors.css') }}" />
{% endblock %}

{% block full_page %}
<main class="error-page">
  <section class="error-panel" aria-labelledby="error-title">
    <div class="error-icon"><i class="bi bi-music-note-beamed"></i></div>
    <h1 id="error-title" class="error-title">404 - Page Not Found</h1>
    <p class="error-copy">The track or page you are looking for does not exist or has been removed.</p>
    <a href="{{ url_for('main.discover') }}" class="btn-ts-primary error-action">
      <i class="bi bi-compass"></i>
      Back to Discover
    </a>
  </section>
</main>
{% endblock %}
