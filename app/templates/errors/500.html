{% extends "base.html" %}
{% block title %}Server Error &mdash; TuneFeed{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/errors.css') }}" />
{% endblock %}

{% block full_page %}
<main class="error-page">
  <section class="error-panel" aria-labelledby="error-title">
    <div class="error-icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h1 id="error-title" class="error-title">500 - Something Went Wrong</h1>
    <p class="error-copy">An unexpected error occurred. Please try again in a moment.</p>
    <a href="{{ url_for('main.discover') }}" class="btn-ts-primary error-action">
      <i class="bi bi-compass"></i>
      Back to Discover
    </a>
  </section>
</main>
{% endblock %}
